apiVersion: apps/v1
kind: Deployment
metadata:
  name: abhi-app-deployment
spec:
  replicas: 3  
  selector:
    matchLabels:
      app: ecommerce
  template:
    metadata:
      labels:
        app: ecommerce
    spec:
      containers:
      - name: frontend
        image: abhiraj328/abhi-frontend:latest 
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: abhi-app-service
spec:
  type: NodePort
  selector:
    app: ecommerce
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30007 
